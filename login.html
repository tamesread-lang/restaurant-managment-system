<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة التحكم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="login-card">
        <h2>تسجيل دخول الإدارة</h2>
        <p class="subtitle">أدخل بيانات الاعتماد الخاصة بك للوصول للوحة التحكم</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" required placeholder="name@restaurant.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" id="btn-submit" class="btn btn-block">دخول</button>
        </form>
        <div id="error-msg" class="alert alert-danger hidden"></div>
    </div>

    <!-- تضمين مكتبة Supabase عبر CDN لأننا لا نستخدم Framework -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="auth.js"></script>
</body>
</html>
